name: smart_clinic_frontend
description: Smart Clinic Application - Book appointments with doctors
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ==========================================
  # Localization (دعم الترجمات والتواريخ)
  # ==========================================
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2  # ✅ تم التعديل من ^0.18.1 إلى ^0.20.2

  # ==========================================
  # UI & Utilities
  # ==========================================
  cupertino_icons: ^1.0.6

  # ==========================================
  # State Management (إدارة الحالة)
  # ==========================================
  provider: ^6.1.1

  # ==========================================
  # Networking (الاتصال بالشبكة)
  # ==========================================
  dio: ^5.4.0

  # ==========================================
  # Authentication & Storage (المصادقة والتخزين)
  # ==========================================
  shared_preferences: ^2.2.2

  # ==========================================
  # Navigation (التنقل بين الصفحات)
  # ==========================================
  go_router: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true