env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # يسمح بالتشغيل اليدوي

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4  # ✅ v4 يعمل مع Node.js 20

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4  # ✅ v4 يعمل مع Node.js 20
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.4'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: ✅ Run tests (optional)
        run: flutter test || true

      - name: 🔨 Build APK
        run: flutter build apk --release --split-per-abi --tree-shake-icons

      - name: 📤 Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-release
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: 📤 Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: 📤 Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64-release
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30